<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'none';
    object-src 'none';
    media-src 'none';
    frame-src 'none';
    child-src 'none';
    worker-src 'self';
    manifest-src 'self';
  ">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
  <title>拼图计时器</title>
</head>
<body>
  <!-- 首页 -->
  <div id="page-home" class="page active">
    <header class="header">
      <h1 class="title">拼图计时器</h1>
      <button id="refresh-btn" class="btn-refresh" title="刷新">↻</button>
    </header>
    
    <div class="content">
      <!-- 添加拼图 -->
      <div class="add-section">
        <input 
          type="text" 
          id="puzzle-name-input" 
          placeholder="拼图名称..." 
          class="input-text"
          maxlength="30"
        >
        <div class="add-row">
          <input 
            type="number" 
            id="puzzle-pieces-input" 
            placeholder="片数..." 
            class="input-text input-small"
            min="1"
          >
          <input 
            type="text" 
            id="puzzle-brand-input" 
            placeholder="品牌..." 
            class="input-text input-small"
            maxlength="20"
          >
          <button id="add-puzzle-btn" class="btn-primary btn-small">添加</button>
        </div>
      </div>
      
      <!-- 拼图列表 -->
      <div id="puzzle-list" class="list-container">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">🧩</div>
          <p>还没有拼图记录</p>
          <p class="empty-hint">点击上方输入框添加第一个拼图</p>
        </div>
      </div>
      
      <!-- 列表删除确认弹窗 -->
      <div id="modal-delete-list" class="modal">
        <div class="modal-content">
          <h3>确认删除</h3>
          <p id="delete-list-message">确定要删除这个拼图吗？此操作无法撤销。</p>
          <div class="modal-actions">
            <button id="cancel-delete-list" class="btn-secondary">取消</button>
            <button id="confirm-delete-list" class="btn-danger">删除</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 详情页 -->
  <div id="page-detail" class="page">
    <header class="header">
      <button id="back-btn" class="btn-back">←</button>
      <h1 class="title" id="detail-title">拼图详情</h1>
      <div class="header-actions">
        <button id="delete-btn" class="btn-delete">删除</button>
      </div>
    </header>
    
    <div class="content">
      <!-- 拼图信息 -->
      <div class="puzzle-info-card" id="puzzle-info-card" style="display: none;">
        <div class="puzzle-info-item">
          <span class="puzzle-info-label">品牌</span>
          <span class="puzzle-info-value" id="puzzle-brand">-</span>
        </div>
        <div class="puzzle-info-divider"></div>
        <div class="puzzle-info-item">
          <span class="puzzle-info-label">片数</span>
          <span class="puzzle-info-value" id="puzzle-pieces">-</span>
        </div>
      </div>
      
      <!-- 统计信息 -->
      <div class="stats-card">
        <div class="stat-item">
          <div class="stat-value" id="total-time">00:00:00</div>
          <div class="stat-label">总用时</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-value" id="session-count">0</div>
          <div class="stat-label">分段数</div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item">
          <div class="stat-value" id="avg-time">00:00:00</div>
          <div class="stat-label">平均时长</div>
        </div>
      </div>

      <!-- 计时按钮 -->
      <div class="timer-section">
        <div class="current-time" id="current-time">00:00:00</div>
        <button id="timer-btn" class="btn-timer">开始计时</button>
      </div>

      <!-- 倒计时设置 -->
      <div class="countdown-section">
        <label class="checkbox-label">
          <input type="checkbox" id="countdown-enabled" checked>
          <span class="checkmark"></span>
          <span>启用防沉迷提醒</span>
        </label>
        
        <div class="countdown-options show" id="countdown-options">
          <div class="countdown-presets">
            <button class="btn-preset" data-minutes="15">15分钟</button>
            <button class="btn-preset" data-minutes="30">30分钟</button>
            <button class="btn-preset" data-minutes="45">45分钟</button>
            <button class="btn-preset active" data-minutes="60">60分钟</button>
          </div>
          <div class="custom-countdown">
            <input 
              type="number" 
              id="custom-minutes-input" 
              placeholder="自定义分钟..." 
              class="input-text input-small"
              min="1"
            >
            <button id="set-custom-btn" class="btn-secondary btn-small">设置</button>
          </div>
          <div class="countdown-display" id="countdown-display">
            <div class="countdown-label">剩余时间</div>
            <div class="countdown-time" id="countdown-time">--:--:--</div>
          </div>
        </div>
      </div>

      <!-- 分段时间列表 -->
      <div class="section">
        <h2 class="section-title">分段记录</h2>
        <div id="session-list" class="session-list">
          <div class="empty-sessions">
            <p>暂无分段记录</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 删除确认弹窗 -->
  <div id="modal-delete" class="modal">
    <div class="modal-content">
      <h3>确认删除</h3>
      <p>确定要删除这个拼图记录吗？此操作无法撤销。</p>
      <div class="modal-actions">
        <button id="cancel-delete" class="btn-secondary">取消</button>
        <button id="confirm-delete" class="btn-danger">删除</button>
      </div>
    </div>
  </div>

  <!-- 提醒弹窗 -->
  <div id="modal-reminder" class="modal">
    <div class="modal-content reminder">
      <div class="reminder-icon">⏰</div>
      <h3>时间到！</h3>
      <p>已经拼了很长时间，休息一下吧！</p>
      <div class="modal-actions">
        <button id="close-reminder" class="btn-primary">知道了</button>
      </div>
    </div>
  </div>

  <script>
let swRegistration = null;

// 更新提示UI
function showUpdateNotification() {
  const notification = document.getElementById('update-notification');
  if (notification) {
    notification.classList.add('show');
  }
}

// 隐藏更新提示并刷新
function hideUpdateNotification() {
  const notification = document.getElementById('update-notification');
  if (notification) {
    notification.classList.remove('show');
  }
  // 通知Service Worker跳过等待，立即激活新版本
  if (swRegistration && swRegistration.waiting) {
    swRegistration.waiting.postMessage({ type: 'SKIP_WAITING' });
  }
  // 重新加载页面
  setTimeout(() => {
    window.location.reload();
  }, 300);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(registration => {
      console.log('Service Worker registered:', registration);
      swRegistration = registration;
      
      // 检查是否已经有等待中的更新
      if (registration.waiting) {
        showUpdateNotification();
      }
      
      // 监听更新状态
      registration.addEventListener('updatefound', () => {
        const newWorker = registration.installing;
        
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // 新的Service Worker已安装但尚未激活
            showUpdateNotification();
          }
        });
      });
      
      // 监听来自Service Worker的消息
      navigator.serviceWorker.addEventListener('message', (event) => {
        if (event.data && event.data.type === 'SW_ACTIVATED') {
          console.log('Service Worker activated:', event.data.version);
        }
      });
    })
    .catch(error => {
      console.log('Service Worker registration failed:', error);
    });
  
  // 监听Controller Change事件（用户从另一个标签页触发了更新）
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    // Service Worker控制器发生变化，可能是有新版本
    console.log('Service Worker controller changed');
  });
}
</script>
<script src="app.js"></script>

<!-- PWA更新提示 -->
<div id="update-notification" class="update-notification">
  <div class="update-notification-content">
    <div class="update-icon">🔄</div>
    <div class="update-text">
      <strong>发现新版本</strong>
      <p>点击刷新以更新到最新版本</p>
    </div>
    <button id="btn-update" class="btn-update">刷新</button>
  </div>
</div>

<script>
document.getElementById('btn-update').addEventListener('click', hideUpdateNotification);
</script>

</body>
</html>
